<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;600&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <h1>Dice Roller</h1>
        <div class="divider"></div>

        <div class="controls">
            <label for="dice-count">Dice count</label>
            <input type="number" id="dice-count" min="1" max="15" value="2">
            <div class="btn-row">
                <button id="roll-btn" class="btn-roll">Roll</button>
                <button id="reset-btn" class="btn-reset">Reset</button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="history-header">
            <span class="history-title">History</span>
            <button id="clear-history" class="history-clear">clear</button>
        </div>
        <div id="history" class="history-list">
            <div class="empty-history">No rolls yet</div>
        </div>
    </aside>

    <main class="main">
        <div id="canvas-container"></div>
        <div id="result" class="result-bar"></div>
    </main>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
